<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Chart 02 — Monthly Solar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>body{margin:0;background:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Calibri,sans-serif;}.wrap{width:900px;height:480px;}</style>
</head>
<body>
<div class="wrap"><canvas id="c"></canvas></div>
<script>
const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const vals=[480,460,380,300,320,420,510,500,480,380,350,420];
const colors=months.map((m,i)=>i===3?'#BA7517':'#0D2B4E');
const ctx=document.getElementById('c').getContext('2d');
new Chart(ctx,{type:'bar',data:{
  labels:months,
  datasets:[{label:'Solar Generation (MWh)',data:vals,backgroundColor:colors,borderRadius:4,
    datalabels:{anchor:'end',align:'end',font:{size:12,weight:'bold'},color:'#1E293B'}}]},
  options:{responsive:true,maintainAspectRatio:true,
    plugins:{legend:{display:false},
      tooltip:{callbacks:{label:ctx=>` ${ctx.raw} MWh`}},
      annotation:{annotations:{aprilLabel:{type:'label',xValue:3,yValue:330,content:['APRIL','STRESS MONTH'],font:{size:11,weight:'bold'},color:'#BA7517'}}}},
    scales:{
      x:{ticks:{font:{size:13},color:'#1E293B'},grid:{display:false}},
      y:{title:{display:true,text:'MWh / month',font:{size:13},color:'#64748B'},
        ticks:{font:{size:12},color:'#64748B'},grid:{color:'#E2E8F0'},
        suggestedMax:580}}}});
</script></body></html>
