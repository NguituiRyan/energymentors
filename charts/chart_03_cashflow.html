<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Chart 03 — Cash Flow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>body{margin:0;background:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Calibri,sans-serif;}.wrap{width:900px;height:480px;}</style>
</head>
<body>
<div class="wrap"><canvas id="c"></canvas></div>
<script>
const ctx=document.getElementById('c').getContext('2d');
new Chart(ctx,{type:'line',data:{
  labels:['Y1','Y2','Y3','Y4','Y5','Y7','Y10','Y15','Y17','Y18','Y20','Y25'],
  datasets:[{
    label:'Cumulative Cash Position (KES M)',
    data:[-765,-4195,-6071,-5499,-3796,-3670,-3620,-4160,-4215,-4004,-3835,0],
    borderColor:'#0D2B4E',borderWidth:3,fill:true,
    backgroundColor:'rgba(13,43,78,0.1)',tension:0.4,pointRadius:6,
    pointBackgroundColor:(ctx)=>{
      const v=ctx.raw;
      if(v===-4215)return'#BA7517';
      if(v===0)return'#166534';
      return'#0D2B4E';
    },
    pointBorderColor:'#fff',pointBorderWidth:2}]},
  options:{responsive:true,maintainAspectRatio:true,
    plugins:{legend:{labels:{font:{size:13},color:'#1E293B'}},
      tooltip:{callbacks:{label:ctx=>`KES ${ctx.raw.toLocaleString()}M`}}},
    scales:{
      x:{ticks:{font:{size:13},color:'#1E293B'},grid:{display:false}},
      y:{title:{display:true,text:'Cumulative Position (KES M)',font:{size:13},color:'#64748B'},
        ticks:{font:{size:12},color:'#64748B',callback:v=>`KES ${v.toLocaleString()}M`},
        grid:{color:'#E2E8F0'}},
      },
    annotation:{annotations:{bess:{type:'line',yMin:-4215,yMax:-4215,xMin:'Y17',xMax:'Y17',borderColor:'#BA7517',borderWidth:2,label:{content:'Year 17 BESS Replacement',display:true,color:'#BA7517',font:{size:11}}},
      break:{type:'line',yMin:0,yMax:0,borderColor:'#166534',borderWidth:2,borderDash:[5,5]}}}}}});
</script></body></html>
