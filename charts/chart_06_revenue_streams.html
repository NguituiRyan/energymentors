<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Chart 06 — Revenue Streams</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>body{margin:0;background:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Calibri,sans-serif;}.wrap{width:900px;height:500px;}</style>
</head>
<body>
<div class="wrap"><canvas id="c"></canvas></div>
<script>
const ctx=document.getElementById('c').getContext('2d');
const labels=['Enterprise / Jua Kali','YattaFarm Produce','Cooperative Rentals','Grid Export (Net Metering)','E-Matatu Fleet','BESS Grid Services','CSEB External Sales','CHC / Pharmacy','Climate Telemetry API'];
const vals=[92,25.4,19.8,16.5,13.1,7,4.8,3.5,0.425];
const colors=['#0D2B4E','#166534','#0E7490','#BA7517','#1A5C9E','#2563EB','#15803D','#4ADE80','#94A3B8'];
new Chart(ctx,{type:'bar',data:{
  labels:labels,
  datasets:[{label:'Revenue (KES M/year)',data:vals,backgroundColor:colors,borderRadius:4,indexAxis:'y'}]},
  options:{responsive:true,maintainAspectRatio:true,indexAxis:'y',
    plugins:{legend:{display:false},
      tooltip:{callbacks:{label:ctx=>`KES ${ctx.raw}M/year`}}},
    scales:{
      x:{title:{display:true,text:'KES M / year',font:{size:13},color:'#64748B'},
        ticks:{font:{size:12},color:'#64748B',callback:v=>`${v}M`},grid:{color:'#E2E8F0'}},
      y:{ticks:{font:{size:12},color:'#1E293B'},grid:{display:false}}}}});
</script></body></html>
